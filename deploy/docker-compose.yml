version: '3.8'
services:
  backend:
    build: ../backend
    ports:
      - '8000:8000'
    volumes:
      - ../backend:/app
    environment:
      - PYTHONUNBUFFERED=1
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ../frontend/webapp:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - '3000:3000'
